spring:
  application:
    name: medisalud-appointments-api

  mvc:
    async:
      request-timeout: -1

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medisalud}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  tomcat:
    connection-timeout: -1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: medisalud-appointments
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

spring.ai.mcp.server:
  name: medisalud-appointments
  version: 1.0.0
  type: SYNC
  sse-message-endpoint: /mcp/messages
